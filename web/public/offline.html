<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0B0F14" />
    <title>Ehsbha — Offline</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      :root { color-scheme: dark light; }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        font-family: 'Cairo', 'Inter', system-ui, -apple-system, sans-serif;
        background: #0B0F14;
        color: #E8ECF1;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        text-align: center;
      }
      @media (prefers-color-scheme: light) {
        body { background: #FFFFFF; color: #0B0F14; }
      }
      .wrap { max-width: 28rem; }
      .icon {
        width: 64px;
        height: 64px;
        margin: 0 auto 1.5rem;
        border-radius: 16px;
        background: linear-gradient(135deg, #34D399, #60A5FA);
        display: grid;
        place-items: center;
        color: #0B0F14;
      }
      h1 { font-size: 1.5rem; margin: 0 0 0.5rem; font-weight: 700; letter-spacing: -0.02em; }
      p { color: #8B95A7; margin: 0 0 1.5rem; font-size: 0.95rem; line-height: 1.5; }
      button {
        appearance: none;
        font: inherit;
        cursor: pointer;
        border: none;
        background: linear-gradient(135deg, #34D399, #60A5FA);
        color: #0B0F14;
        font-weight: 600;
        padding: 0.75rem 1.5rem;
        border-radius: 10px;
        transition: transform 120ms ease, box-shadow 120ms ease;
      }
      button:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(52,211,153,.25); }
      button:active { transform: translateY(0); }
    </style>
  </head>
  <body>
    <main class="wrap">
      <div class="icon" aria-hidden="true">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="1" y1="1" x2="23" y2="23"/>
          <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
          <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
          <path d="M10.71 5.05A16 16 0 0 1 22.58 9"/>
          <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
          <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
          <line x1="12" y1="20" x2="12.01" y2="20"/>
        </svg>
      </div>
      <h1 id="title">أنت غير متصل</h1>
      <p id="body">سنُعيد محاولة الاتصال تلقائياً عند رجوع الإنترنت. يمكنك المتابعة بمجرد الاتصال.</p>
      <button onclick="window.location.href='/'">إعادة المحاولة</button>
    </main>
    <script>
      (function () {
        try {
          var lang = localStorage.getItem('ehsbha.locale') || 'ar';
          if (lang === 'en') {
            document.documentElement.lang = 'en';
            document.documentElement.dir = 'ltr';
            document.getElementById('title').textContent = "You're offline";
            document.getElementById('body').textContent = "We'll reconnect automatically once you're back online. You can continue as soon as the connection returns.";
            document.querySelector('button').textContent = 'Retry';
          }
        } catch (e) {}
        window.addEventListener('online', function () { window.location.href = '/'; });
      })();
    </script>
  </body>
</html>
